body:
  text: 一秘傳二陳湯加減法二陳橘半茯苓草清氣化痰為至寶膈上不寬加枳桔火旺生痰芩連好參朮加名六君子健脾和胃無如此中脘寒疼去了參香砂配用皆能止飲食過餐不克消曲糵山楂厚朴調再加枳實芩連炒何愁體弱胃脾嬌咳嗽生痰分冷熱熱則芩連並枳桔寒痰枳縮配原方化氣胸中痰自泄風寒外感嗽何辜二陳枳桔與前胡葛根桑杏能清肺東坡為此號參蘇二陳半夏性本燥血虛煩渴皆不要四物湯中不必加貝母代之專取效人有風痰疾病生天麻白附皂南星濕痰在胃身多軟二術仍須配二陳火鬱胸中老痰結滯住喉間咯不絕夏蔞香附桔連翹少佐玄胡痰可滅痰在經絡及四肢薑汁還將竹瀝施腸胃有痰須枳實脅間白芥永痊除溫膽湯加竹茹實寧神豁痰為第一若加枳殼共南星湯號導痰能利膈去草陳皮四七湯加添蘇樸與生薑散郁消痰兼理氣孕生惡阻用之安嘔吐皆因胃火炎脈來洪數嘔連綿急用本方加枳實竹茹薑汁炒芩連若還藥也難吞下檳榔些小木香煎五六日來嘔不休心胸脹悶手難揉多加枳樸芩連芍便秘硝黃一服瘳嘈雜噯氣一般看胸中積火與停痰石膏香附並星夏二陳加上減何難同療吞酸與吐酸本方加入炒茱連更加蒼朮與白茯行其濕熱便安痊水停心下名曰飲枳茯豬苓利小便此是二陳加減法休將浪與外人傳二秘傳四物湯加減法四物芎歸芍地黃女科諸疾是良方調經養血醫虛損胎產無如用此湯參朮茯甘名八物氣虛血弱功甚捷十全加了桂黃耆大補真元與精血若對參蘇號補心心虛血少夢中驚產後感寒宜服此不須加減效如神下午發熱本陰虛柴芩知柏可痊除骨蒸勞熱柴耆鱉知柏仍兼地骨皮婦人經水適然來似瘧湯中對小柴妊娠月水時時下膠艾加之止漏胎經水過期血少陰本方加橘與耆參經因積氣先為痛香附莪稜服自行月經黑紫及先期方入芩連共牡皮小腹瘀經兜澀痛桃紅烏附莫教遲瘦婦血枯經塞閉木附檳殼桃紅治肥人色淡屬於痰配合二陳成一劑經水行來太去多芩連柴柏可同科更加荊芥與羌活升提其氣便安和方加芩術善安胎胎痛砂蘇便郁開腹大異常成水病心胸氣逆如鼓硬鯉魚湯煎術茯苓減地芎加姜橘應胎氣不安胸膈脹枳桔砂蘇即先暢胎婦心煩號子煩芩麥茯知防竹項芎歸二味佛手名坐草臨煎可保生若是產難生不下草霜白芷一同行焦姜能治產後熱甘辛大能補陰血汗多方內減川芎急服參耆防氣脫產後血迷成血暈去多惡露精神困澤蘭芎歸荊草參散號清魂能定暈黑神減芎入桂姜炙草黑豆炒蒲黃淨露下胞除腹痛酒便煎服效非常產後如何惡露少若無別症精神好驀然寒熱腹中疼還用黑神真個好產後須當四物湯大凡初產配焦姜產初用芍相生氣膩膈尤嫌熟地黃腸滑地歸皆可忌汗多須把川芎去血虛腹痛芍還良減增四物身藏秘三秘傳小柴胡湯加減法小柴半夏參芩草少陽經病稱為寶往來寒熱日晡時嘔而脅痛用之好本經之症合陽明口渴而煩乾嘔頻目痛鼻乾眠不得乾葛知母炒黃芩中心痞滿熱尤甚枳桔加之有神應若還痞結不能寬小陷胸湯堪可並汗少唇焦口乾渴飲水無休倚連葛若還不解卻何如竹葉石膏相配合汗後渾身壯熱增妄言乾嘔更呻吟黃連解毒同煎服管取須臾便得寧大便泄利熱還蒸卻用原方配四苓若是發黃便溺赤茵陳知柏再加增大便不通口乾涸蔞實黃連並枳樸若還秘結不通時大柴胡湯用無錯身熱惡風口不幹本方須合桂枝湯若是唇焦煩渴甚可將白虎配原方胸煩不嘔減夏參本方倍入瓜蔞仁渴除半夏加天粉腹痛加芍去黃芩脅下硬痞加牡蠣茯主弱澀心下悸痞而胸脅脹滿時牡蠣乾薑出家秘微熱不渴欲近衣減卻人參用桂枝溫病發熱渴而嗽加添五味莫令遲婦人邪熱入血室晝靜夜劇無人識似瘧經水適然來四物小柴湯可覓過經胸脅滿嘔潮小柴湯內入芒硝溫瘧渴煩或發熱白虎柴胡二藥調傷寒日久號過經表裡俱無用此行若是邪多兼氣弱重加生脈倍人參瘥後又因勞食復壯熱心驚痰氣促還須溫膽配原方急服令人愈應速仲景設立小柴胡特為邪傳在半途和解處中因此設用時斟酌莫糊塗主方何用柴芩別味苦以發傳經熱止嘔除煩半夏宜性能下氣味辛列表不足者緩以甘人參甘草緩中央調和榮衛須薑棗和解無如用此湯四儒醫心鏡各症病原並用藥治法要訣中風中風者有真中風有類中風之分真中風者卒時昏倒皆因體氣虛弱榮衛失調或喜怒憂思悲驚恐或酒色勞力所傷以致真氣耗散腠理不密風邪乘虛而入及其中也有中腑中臟中血脈三等中腑者面加五色表證惡風寒拘急不仁此中腑也先服疏風飲解表後服愈風湯調理中臟者唇緩失音鼻塞耳聾目瞀便閉重則半身不遂口眼歪斜言語艱澀或癱瘓不伸或舌強不語痰涎壅塞不省人事牙閉緊急者此風中臟也若大便閉結者先服滋潤湯通之元氣虛弱者用蜜導法通之後服愈風湯調理若口眼歪斜不省人事牙關緊急者先用搐鼻法急炙百會人中頰車合谷先服導痰湯吐痰出為效後服愈風湯調理若左半身不遂手足癱瘓者是血虛與死血用四物湯合二陳湯調理若右半身不遂手足癱瘓者是氣虛與濕痰用四君子湯合二陳湯調理若臟腑俱中者藥必兼用先表而後通之後服愈風湯調理有中血脈者外無惡風寒之證內無大小便之閉但四肢不能舉口不能言是風中血脈即中經也用當歸養榮湯補血養筋此皆治真中風也中腑者可治中臟者難醫中風之脈浮遲而緩者生浮數實大者死有不治之證口開手撒眼合遺尿髮直吐沫聲如鼾睡口噤不語搖頭上竄面赤如妝汗出如珠目反直視痰喘作聲皆不治也疏風飲加減治風中在腑惡風寒不仁川芎細辛防風羌活白芷陳皮半夏烏藥香附白茯苓桂枝當歸有熱去桂枝加柴胡黃芩有汗去川芎有痰去桂枝烏藥香附加瓜蔞仁枳實桔梗黃芩水二碗生薑一片煎溫服愈風湯加減治一切風中後調理當歸人參白朮半夏陳皮防風羌活白茯苓川芎枳實甘草白芍有痰加竹瀝薑汁少許氣喘加蘇子沉香木香去白朮水二碗棗二枚生薑一片煎八分入竹瀝磨木香調服活血滋潤湯治風中在臟大便閉結當歸生地熟地杏仁火麻仁枳殼羌活紅花厚朴檳榔大黃水二碗煎八分食前熱服導痰湯加減治風中痰涎壅盛牙關緊急不能言語白茯苓半夏陳皮枳殼桔梗南星甘草當歸黃芩杏仁瓜蔞仁水二碗姜一片入竹瀝薑汁少許服四物湯加減治風中左半身不遂手足癱瘓當歸川芎熟地白芍茯苓半夏陳皮甘草羌活防風桃仁紅花木香手不遂加黃芩薄桂味淡能橫行手臂引藥行至病處足不遂加牛膝黃柏引藥下行水二碗姜一片棗二枚煎六分入竹瀝磨木香調服四君子合二陳湯加減治風中右半身不遂手足癱瘓人參白朮茯苓陳皮半夏甘草當歸白芍藥防風羌活蒼朮木香手不遂加黃芩薄桂足不遂加黃柏牛膝痰盛加瓜蔞仁枳實水二碗姜三片棗二枚煎六分入竹瀝薑汁少許磨木香調服當歸養榮湯加減治風中血脈四肢不能舉口不能言當歸川芎白芍熟地人參陳皮甘草白茯苓羌活防風秦艽薄桂牛膝有痰加瓜蔞仁枳實竹瀝薑汁少許去薄桂牛膝水二碗姜一片煎六分入竹瀝調服中風口噤遲浮吉急實大數三魂孤大率氣血兩虛有痰有火治法開痰行氣養血散風主有中腑中臟中經中氣之分丹溪曰中腑多著四肢中臟多滯九竅詩括曰中風手足不遂者是為中腑症在表耳聾眼瞀口喎斜是為中臟症在裡外無六經之病內無便溺之阻肢不能舉口不能言此中經也又有中氣之說俗言為之氣厥此因七情所感氣暴則中氣復即已雖不藥而愈有夏月卒倒名為中暑風痰壅盛不能言者皆用吐法一吐不已再吐之若有氣血兩虛不可吐也如果氣虛之症補以參耆血虛之病調以四物丹溪曰中腑先用續命湯發其表調以通聖辛涼之劑中臟用三化湯通其滯調以十全四物之類中經之症當用大秦艽湯補血以養筋中氣之症烏藥順氣散蘇合香丸各從症而治之田氏考之曰氣固形實形虛中風風為百病之長也中風之名非外來之風邪也乃因濕中生痰痰中生熱熱中生風皆是木火為病原病式曰諸風掉眩皆屬肝木小學曰休治風休治燥治得火時風燥了此論乃前賢之格言後學之準繩也今立方於後不可不遵之不治症口開心絕手撒脾絕眼合肝絕遺尿腎絕喉如鼾睡肺絕若見一症不可治也又有筋枯者不治舉動則筋痛以其無血滋養故也小續命湯中腑先用發表如有汗去麻黃加當歸倍加芍藥麻黃人參黃芩芍藥防己防風川芎杏仁桂枝甘草各一兩附子五錢每服七錢姜三片水煎服防風通聖散中腑後用調之內有芒硝麻黃二味量其虛實酌用防風川芎當歸芍藥大黃連翹芒硝麻黃薄荷各五錢石膏桔梗黃芩荊芥白朮梔子各二兩滑石三兩甘草一兩每服一兩姜三片水煎服三化湯中臟先用此藥通之厚朴大黃枳實羌活每服一兩姜三片水煎服十全大補湯中臟後用此藥調之人參白朮茯苓芍藥當歸川芎熟地黃耆各等分甘草肉桂各三分每服一兩姜三片棗二枚水煎服大秦艽湯中經用此藥養之秦艽二兩石膏二兩甘草川芎當歸白芍獨活羌活茯苓防風生地熟地黃芩白芷白朮各一兩細辛五錢每服一兩水煎天陰雨加生薑七片夏加知母一兩田氏祛風化痰湯陳皮半夏茯苓甘草厚朴南星枳殼防風各等分前胡天麻少許有汗加人參白芍黃芩秦艽丸即大秦艽湯煉蜜為丸如彈子大每服一丸薑湯化下或酒化亦可治中腑中臟中經後用此藥調之資壽解語湯方見玉機微義清暑益氣湯暑風通用方見丹溪纂要烏藥順氣散中暑用此方見官方備用天麻南星湯治中風無汗痰壅盛者服之方見保生余錄類中風類中風者則常有之因內傷氣虛卒倒昏不知人事此名類中風也富貴之人起於情欲所傷貧苦之人起於飢寒所傷氣衰者多有此證若卒時昏倒者屬氣虛卒倒用參耆湯補之有中氣中暑有中寒有痰厥有血暈類中風者多各有法治不同不可作風證用風藥誤治之參耆湯加減治氣虛卒倒人參黃耆白朮茯苓當歸熟地陳皮半夏甘草有痰加枳實竹瀝薑汁少許身涼脈來沉細手足厥逆加熟附子以行參耆之氣身熱加柴胡芍藥去半夏胸膈飽悶加砂仁去熟地白朮眩暈加川芎天麻本方治內傷氣虛卒倒者甚妙加生薑一片棗二枚水煎不拘時服中氣中氣症者因與人相爭暴怒氣逆而暈倒者此名中氣氣脈是沉風脈是浮風中身溫且多痰涎氣中身涼且無痰涎先用薑汁灌救後服木香順氣散氣復即醒不藥而愈也木香順氣散治中氣症暈倒者木香砂仁烏藥香附青皮枳殼陳皮厚朴官桂甘草半夏乾薑氣逆不轉加蘇子沉香姜三片水煎八分磨木香調服痰厥痰厥者皆因內虛受寒痰氣阻塞手足厥冷麻痹眩暈厥倒脈來沉細用二陳湯加減治之痰出為妙二陳湯加減治痰厥暈倒茯苓半夏陳皮甘草當歸枳實官桂桔梗杏仁良薑砂仁木香氣逆加蘇子元氣虛弱去枳實姜三片水煎六分不拘時服血暈血暈者皆因平日去血過多血虛而成血暈脈來微澀用四物湯加減治之不可艾灸驚哭叫動動則乘虛而死矣四物湯加減即當歸補血湯治血虛眩暈卒倒當歸川芎生地白芍人參黃耆茯苓陳皮白朮甘草荊芥飽悶加香附砂仁去黃耆白朮烏梅一個棗二枚水煎六分不拘時服傷寒傷寒六脈浮緊忌沉細傷寒為病返復變遷粗工不識死在返掌若冬時即病乃為傷寒寒毒藏於肌膚至春變溫病春末為晚發至夏變為暑病所受病則同治法則異全倚脈症為憑察終用藥庶為無差有起於太陽終於厥陰此為循經傳度也或在太陽直入少陽為越經傳度也有首尾只在一經而不傳也有兩感傷寒榮衛俱病者有寒傷榮風傷衛之分無汗惡寒有汗惡風是也有傷風見寒外風症而內寒脈也有傷寒見風外寒症而內風脈也有陰症傷寒直中陰經六脈沉細也有四症類傷寒寒痰腳氣食積勞煩也臨症之時望聞問切仔細詳察若差毫釐其禍不小慎之慎之田氏考之曰傷寒治法惟在專門之士學者當要隨機應變不可拘定全要自己省悟且如以經言之症傳有六經常有九有在表在裡之分有取症不取脈之分有標本之分內經曰知標與本萬舉萬當不知標本謂之妄行然傷寒之標本近世醫者鮮有知之不可不明辨也論曰所患病氣為本傳變陰陽為標內傷七情為本外感為標經曰急則治其標緩則治其本是也如症在表發熱惡寒法當汗之如不惡寒反惡熱病屬裡法當下之若在半表半裡之間往來寒熱法當和之且如病在三陽經大便不通手不敢迎腹豈不下乎又如在三陰經身手大熱坐臥非安喘息不寧敢不汗乎所謂取症不取脈也予今錄傷寒之大略立方於後雖不能全備未必無小補焉麻黃湯治太陽無汗脈浮而緊春分後忌用麻黃一兩桂枝一兩甘草五錢杏仁五十粒去尖每服五錢生薑三片水煎服取汗為度桂枝湯治太陽有汗脈浮緩春分後忌用桂枝赤芍藥甘草每服五錢姜三片棗一枚水煎服頻臾啜稀粥助藥力以取微汗若小便數及飲酒人不用甘草恐中滿而嘔小柴胡湯治少陽往來寒熱胸脅疼痛心煩喜嘔又治風溫身熱柴胡二兩黃芩七錢人參七錢甘草七錢半夏八錢每服五錢姜三片棗二枚水煎溫服大柴胡湯治內熱大便難身熱不惡寒反惡熱柴胡二兩黃芩七錢芍藥三錢半夏六錢半枳實四錢大黃五錢各和勻每服五錢水煎服大承氣湯治胃熱譫語五六日不大便腹痛煩渴少陰舌乾口燥如汗後不惡寒反惡熱狂言而喘用小承氣湯大黃厚朴枳實芒硝水二碗半先煎厚朴枳實至一碗入大黃再煎至七分去渣入芒硝再煎一二沸溫服以利為度未利再服理中湯治太陰自利不渴寒多而嘔腹痛鴨溏蛔厥霍亂四肢逆冷氣難布息真陰傷寒人參白朮乾薑甘草各七錢每服五錢水煎本方加附子名附子理中湯此藥服之如不效速灸關元穴大青龍湯治傷寒見風傷風見寒太陽無汗脈浮緊發熱惡寒若脈弱惡風不可服麻黃桂枝各一兩杏仁二十粒甘草一兩石膏半個雞子大每服五錢姜三片棗二枚水煎服玄參升麻湯治失汗症頭面身手發斑玄參升麻石膏知母甘草乾葛川芎各五錢有汗去乾葛川芎每服五錢水煎溫服白虎湯治汗後脈洪大虛煩內加半夏麥冬淡竹葉一把名為竹葉石膏湯知母一兩五錢石膏四兩甘草五錢粳米一合加人參即人參石膏湯水煎入生薑自然汁三匙去渣溫服大羌活湯解利兩感傷寒經云兩感不治然所感有淺深所稟有虛實稟實感淺者生感深稟虛者死不治羌活獨活防己黃芩黃連白朮川芎各一錢細辛五分生地二錢知母二錢水煎服溫膽湯治傷寒病後虛煩不得睡臥兼治心膽虛怯半夏三錢枳實二錢橘皮二錢茯苓一錢甘草五分竹茹一塊如錢大姜三片水煎服導赤各半湯治傷寒後心下不硬腹中不滿大小便如常身無寒熱漸變神昏不語唇焦目赤舌乾或睡中有一二句獨語不飲食水稀粥與之則食不與亦不思形如醉漢庸醫不識而誤者多殊不知熱傳手少陰心也心火炎上逼如肺所以神昏也名曰越經症黃連梔子黃芩滑石甘草知母犀角茯神人參麥冬姜三片棗二枚水煎加燈心一把九味羌活湯治春分後傷寒代桂麻二湯用羌活防風蒼朮各一錢二分五釐甘草白芷川芎生地黃芩各一錢細辛四分姜三片棗二枚水煎服取汗有汗去蒼朮加白朮渴加知母石膏獨參湯治傷寒壞症人參一兩水二鍾煎一鍾用銀器盛煎煎好置新汲水內候冷服之鼻上有汗出得生藿香正氣散加減治外感發熱頭痛內因痰飲凝滯為熱或中脘痞滿嘔逆噁心又治傷寒憎寒壯熱陳皮半夏茯苓甘草白芷藿香桔梗紫蘇厚朴香附川芎葛根姜三片棗二枚水煎服中寒中寒者冬月天氣大寒水冰地凍體虛肌寒中倒口噤難言脈遲身冷手足拘攣或口吐涎沫重則四肢僵直先服生薑汁隨用附子理中湯加減若不急治舌短囊縮而即死矣此冬月之中寒也附子理中湯加減治冬月中寒厥倒附子乾薑吳茱萸官桂人參當歸陳皮厚朴甘草白朮不醒人事用蒸臍法姜三片棗二枚水煎服腹痛加砂仁木香茴香去人參白朮嘔吐加丁香良薑去官桂泄瀉加肉豆蔻訶子砂仁去厚朴口吐涎沫加丁香去官桂寒呃加丁香良薑砂仁茴香去白朮官桂飽悶加砂仁去人參白朮中寒六脈沉細而遲寒之為病多因氣血兩虛卒中天地寒氣或口食冰果冷物使人六脈沉細手足逆冷氣難布息雖有身熱不渴不煩若不急治死須臾當以溫藥散之方有回生之理也田氏考之曰且如寒氣害人有感有傷有中感寒在皮毛傷寒在肉分中寒中五臟令人氣血不和諸脈不行身無熱症六脈細遲上工急治十可全五下工治之百無一生若對症用藥取效甚速差之毫釐謬之千里也生料五積散治中寒感冒寒邪及傷寒內傷生冷此藥服之神效陳皮麻黃桔梗枳殼各九分白芷川芎甘草官桂茯苓半夏當歸白芍各四分乾薑炮六分厚朴六分蒼朮三錢六分姜三片蔥白一個水煎熱服理中湯治中寒昏不知人事及臍腹冷痛霍亂轉筋一切寒症人參一錢白朮一錢甘草五分乾薑二錢附子兩大片水煎服真武湯治傷寒數日已後發熱腹痛目昏頭沉大小便自利有時或澀或嘔或咳或已經汗下不解仍復發熱心下忪悸眩暈皆因渴後飲水停留中脘所致並皆治之茯苓生薑白朮白芍各七錢五分附子一個炮製每服五錢水煎八分溫服咳者加五味子七錢五分細辛乾薑各二錢五分升陽補中湯治中寒六脈沉細內傷雖氣口緊盛按之無力多因房勞感傷此藥服之最效黃耆炙甘草各五分人參升麻橘紅炒當歸白朮各三分白芍酒洗附子二片炮去皮茯苓姜三片水煎服瘟疫瘟疫脈陽濡陰緊盛冬傷於寒寒毒藏於肌膚此因腎水涸竭春木發生無倚滋養春必病溫也自里出表其症頭痛發熱不惡寒而渴當用辛涼之劑微解肌為主不可大發汗也若發熱惡寒齊作者偶感非時之氣為之瘟疫舉家長幼皆相似又有冬溫為病君子當閉藏返泄於外非其時有其氣也其症發熱惡寒左脈浮大右脈浮緩而盛按之無力三者之病用藥之時補中兼散散中兼補然後無失也田氏考之曰有大頭病天行濕氣在高巔之上東垣有法有方陽明邪熱大甚資實少陽相火而為之也多在少陽或在陽明或傳太陽視其腫勢在何部分若大腫屬陽明或在耳前後腫者屬少陽先出皆主其病也治之不可速速則過其病所為上熱未除中寒復生必傷人命此病自表入里乃血受病邪氣見於無形之部分故不敢急治而當緩也九味羌活湯治瘟疫方見丹溪心法升麻葛根湯治無汗惡寒瘟疫及發斑通用升麻芍藥葛根甘草各二兩作五服熱甚者加玄參去芍藥葛根名曰升麻湯萎蕤湯加減治冬瘟萎蕤二分石膏二錢麻黃白薇羌活甘草青木香川芎各一錢五分葛根五分人參桔梗各八分作三服水煎服芩連甘草湯治大頭瘟黃芩酒炒黃連酒炒甘草炒各等分少少不住服或劑畢再用大黃鼠黏子炒煎好入芒硝各等分時時呷之邪氣已平只服前藥若未平再同前藥次第服之取大利邪氣已平則止如陽明渴加石膏少陽渴加天花粉陽明行經加升麻芍藥甘草葛根太陽行經加羌活荊芥防風並前藥同合用之中暑中暑者夏月天氣炎熱元虛而中倒也動而得之為中熱靜而得之為中暑中暑中暍皆是熱也乃夏火之氣也中暑中於心脾二經煩渴自汗面垢脈虛或吐瀉腹痛或嘔噦燥悶重則熱極而昏不醒人事俱用香薷飲加減元氣虛脫者生脈散加減中暍者中於太陽膀胱經也身熱頭痛灑然毛聳背微惡寒口開前板齒燥舌燥生胎大煩渴者用人參白虎湯加香薷扁豆凡治暑症手足雖微冷脈雖虛小切不可用姜附熱藥治用清解暑毒補益元氣為主伏暑霍亂吐瀉者最多亦不可誤作寒治經曰寒傷形熱傷氣理之明也香薷飲加減治中暑煩渴自汗面垢脈虛或腹湧吐瀉香薷扁豆人參白朮茯苓厚朴白芍藥陳皮甘草腹痛去人參白朮加砂仁木香茴香加炒米一撮烏梅一個燈心一分水煎溫服虛汗不止加黃耆酸棗仁嘔吐不止加炒山藥去厚朴噦不止加蓮肉竹茹瀉不止加山藥肉果訶子豬苓澤瀉去厚朴煩躁不止加酸棗仁神砂竹茹麥冬炒黃連去厚朴渴不止加炒黃連麥冬五味子乾葛汗多去乾葛飽悶加砂仁人參白朮少用小便短赤不通加豬苓木通梔子生脈散加減治伏暑吐瀉脫元昏倦脈沉微人參麥冬五味子茯苓山藥白朮黃耆扁豆陳皮甘草加蓮肉烏梅炒米水煎服人參白虎湯治夏中暍即中熱大渴舌燥生胎刺人參石膏知母甘草麥冬梔子白朮茯苓白芍陳皮香薷扁豆加蓮肉烏梅炒米水煎溫服熱極小便遺尿不止加炒黃柏煩躁加神砂酸棗仁若腹痛嘔吐噦瀉飽悶切不可用石膏中暑脈浮而虛忌微遲暑毒中人其害非小若中在腸胃之間使人腹痛水瀉嘔吐名為胃暑或身熱頭痛煩亂不寧如針刺肌肉名為熱傷肉分有咳嗽發熱惡寒身出汗脈數無力名為熱在肺經治法各不同也田氏考之曰寒能傷形暑能傷氣寒傷形雖久病只損其形暑傷氣雖不久病令人速死所謂元氣不可一時之傷也又有動而傷熱靜而傷暑之分且如勞役之人氣血兩虛肺氣全虧故身熱脈洪大動而火勝熱傷氣也又如安逸之人火勝金位肺氣出表故身寒脈沉疾靜而濕勝身體重也二者之病不可不知又有夏月身熱汗出惡寒身重脈沉渴乃中暍後三者之病東垣有一定之法黃連香薷飲治胃暑腸胃之間黃連半斤香薷一斤白扁豆半斤厚朴六兩不宜多用恐損氣每服五六錢姜三片水煎服人參白虎湯治辛苦之人傷熱人參石膏知母各等分甘草五分粳米一合水煎服蒼朮白虎湯治安樂之人傷暑蒼朮石膏知母各等分甘草五分粳米一合水煎服清暑益氣湯治中暑冒暑中暍等症黃耆蒼朮升麻各一錢人參白朮陳皮陳曲炒澤瀉各五分麥冬黃柏青皮葛根各三分甘草炙少許五味子九粒煎服清肺湯治熱在肺經黃芩石膏各等分甘草黃連知母防風梔子桔梗各等分水煎服白虎湯加減治熱傷在內黃連石膏知母各等分甘草五分柴胡人參黃芩半夏各等分姜三片水煎服二香散治中暍用方見丹溪心法中濕濕者有內濕有外濕人之體虛或感山嵐瘴氣或雨濕蒸氣遠行涉水或久臥濕地或汗濕衣鞋而成濕症頭目眩重骨節煩疼腳手痠軟麻痹足膝腫痛筋脈拘攣小腸疝氣偏墜浮腫吊痛此皆外濕也內濕者皆因生冷水食停滯脾虛不能運化停於三二焦注於肌肉滲於皮膚而成內濕也濕傷脾胃者胸腹脹滿四肢浮腫難以屈伸或嘔吐泄瀉小便短澀面目身黃濕傷肺者咳嗽喘急身熱惡寒濕傷腎者腰腳腫痛骨節痠疼濕傷肝者大筋軟短小筋弛長目昏脅痛濕症之病脈沉緩而濡俱用滲濕湯加減治濕不利小便非其治也滲濕湯加減治一切濕症蒼朮白朮茯苓陳皮豬苓澤瀉香附撫芎砂仁厚朴甘草姜一片燈心一分水煎服濕症脾虛發腫滿氣急喘嗽本方去白朮甘草加大腹皮枳殼木香蘇子桑白皮蘿蔔子面目浮腫去撫芎澤瀉加炒山藥芍藥倍加蒼朮白朮燥能勝濕濕得燥則豁然而收瀉甚不止加肉果訶子烏梅乾薑嘔噦去厚朴香附撫芎加炒山藥烏梅炒米如不止加煨乾姜濕症身體重痛手足麻痹痠軟腫痛或枯細痿弱筋脈拘攣本方去香附撫芎厚朴豬苓澤瀉加當歸生地芍藥木香乳香薄桂牛膝酒芩羌活防風蓋風能勝濕濕症小腸疝氣偏墜子腫重痛治方在疝症條內濕症發黃治方在黃疸內中濕脈虛濡忌急疾夫治濕須分南北高下內外之分如西北之地最高則人多食生冷濕面或酒後濕氣怫鬱不得發越甚則臌脹腹滿自內而出也自上而下也東南之地最卑則民多因陰雨濕地或腳腫腿重濕氣客於下焦不能發散甚則痿厥之病有之皆自外而入也自下而上也受病不同治法則異田氏考之曰內外受濕皆是元氣不足邪乘而聾氣血和平豈有此病內經曰六氣之中濕熱為病十居八九濕久不愈鬱而為熱熱傷血不能養筋筋不能束骨而痿弱之病生焉凡治濕在上以微汗散之在中下滲利小便為主活人書云濕症不可汗傷此一句全謂在中下分之但不可只此為例九味羌活湯治上部濕微汗而解羌活酒洗防風蒼朮各一錢五分甘草白芷川芎生地各一錢黃芩酒炒一錢細辛四分姜三片棗二枚水煎服養榮除濕湯治上中下除濕養榮用之有效陳皮半夏茯苓各等分甘草三分防風四分當歸五分蒼朮五分黃柏梔子黃芩炒各等分羌活五分薄桂少許秦艽七分姜三片水煎服茯苓滲濕湯加減治中下濕滲利即解陳皮茯苓各七分甘草三分豬苓澤瀉蒼朮黃柏各八分滑石梔子防己當歸尾各六分木通白朮各六分水煎服火熱火者有君火相火君火者心火也心為君主之官配於五行守位而不動相火者輔助之火也生於虛無寄於肝腎之間聽命而行凡動皆是相火五臟俱有火相火易起五火相扇動矣相火乃元氣之賊無時而不煎熬真陰陰虛則病陰絕則死陰虛火動者難治凡人發熱咳嗽吐痰血者午後至夜發熱面頰唇紅小便赤色脈數無力者便是陰虛火動也治用四物湯加炒黃柏知母是補陰降火之妙藥即滋陰降火湯也有實火有虛火虛火者可補用滋陰降火加人參白朮虛火急甚重者切不可驟用涼藥治須用參耆歸術溫散再加白茯苓陳皮緩之生甘草也凡氣有餘便是火氣從左邊起者肝火也氣從臍下起者陰火也熱從腳下起者虛之極也是火起於九泉十無救一與陰虛火動者治同此皆論虛火之治也凡人氣實火盛發熱脈數大有力者是實火也實火可降正與柴胡芩連梔子等藥雖生冷與之無害也黃連瀉心火黃芩瀉肺火芍藥瀉脾火石膏瀉胃火知母瀉腎火柴胡瀉肝火黃柏瀉膀胱火木通瀉小腸火梔子降火極速從小便泄去其性能曲屈下行此皆治實火之用也凡人自覺身熱他人以手按之不熱此虛熱也倍用參歸地黃補陰則火自降人用輕手按於皮膚熱如火燎重手按之不熱者此熱在肌表也用地骨皮柴胡之類清之凡人飲酒發熱難治不飲酒人因飲酒發熱亦難治用黃連乾葛烏梅以解之而去酒毒也滋陰降火湯治胃經陰虛火動白芍當歸南芎生地知母黃柏地骨皮枸杞麥冬柴胡水煎食後服黃連湯加減治心火舌上生瘡或舌上燥烈或舌腫硬或舌尖出血黃連生地梔子麥冬當歸薄荷白芍藥犀角甘草隨症加減食後服黃芩湯治肺火咳嗽吐血痰鼻紅或咽喉腫痛乾燥生瘡或鼻孔乾燥生瘡或鼻紅腫痛黃芩梔子桔梗白芍麥冬荊芥桑白皮甘草薄荷連翹隨症加減食後服柴胡飲治肝火盛木氣實或在脅下痛或氣從左邊起者或目珠紅腫作痛者皆肝火也柴胡白芍川芎當歸青皮梔子龍膽草連翹甘草隨症加減食後服芍藥湯治脾火或消穀易飢或胃熱口燥煩渴或舌唇生瘡芍藥梔子黃連連翹石膏薄荷甘草隨症加減食後服三黃解毒湯治三焦實火內外皆熱口燥煩渴小便赤口生瘡黃連黃芩黃柏梔子連翹柴胡芍藥食後服涼膈散治三焦實火煩渴小便赤大便結口生瘡連翹山梔黃芩桔梗黃連薄荷甘草當歸生地枳殼芍藥棗二枚水煎食遠服以利為度火熱脈數而無力虛火有力實火沉數鬱火看何經受人生天地全賴五行一水五火自然之理也善攝生者莫過寡欲為先集精為本水升火降然後十二官不得相失火病何由而生也今水既虧則災害至矣二火為病以名而言形氣相生配於五行命曰君火以位而言生於虛無守位稟命因動而見謂之相火能致陰虛為病甚則陰絕則死也明矣田氏考之曰火病最多非此二火經曰氣不足為氣氣有餘便是火丹溪曰氣從左邊起者肝火也氣從臍下起者陰火也氣從腳下起入小腹者乃虛之極也蓋所謂火起九泉又有實火鬱火無根之火何以治之如肝火非柴胡不能平陰火非黃柏地黃不能補火起九泉非四物知母黃柏不能降實火非芩連大黃不能瀉鬱火非羌活不能散無根之火非玄參升麻不能除此治火之大略也臨症之時再當裁之加味三黃解毒湯治實火照前方加玄參石膏滋陰降火湯治虛火及火起九泉皆治之白芍當歸南芎生地知母黃柏地骨皮枸杞麥冬柴胡水煎服升陽散火湯治鬱火四肢五心煩熱因熱鬱遏陽氣下陷或血虛得之平日多食冷物皆生此病方見丹溪纂要加減平肝散治肝火陳皮半夏茯苓甘草黃連當歸川芎白芍香附青皮蒼朮枳殼姜三片水煎服玄參升麻湯治無根之火即熱急頭面體腹有斑者是也石膏知母玄參川芎升麻黃連甘草葛根梔子水煎服疰夏疰夏者屬陰虛乃夏月熱傷元氣不足以致頭眩目昏腿痠腳軟身體微熱五心煩熱口苦舌乾精神困倦無力好睡飲食減少胸膈不舒形如虛怯脈數大無力是疰夏症也用參歸益元湯加減兼服補陰丸調理參歸益元湯加減治疰夏病與滋陰降火藥同人參當歸熟地白芍茯苓麥冬五味子陳皮黃柏知母甘草飽悶加砂仁白豆蔻煩躁加陳砂酸棗仁竹茹噁心加烏梅蓮肉炒米瀉加炒白朮炒山藥砂仁烏梅去熟地黃柏知母小便短赤加木通梔子腰痛加杜仲茴香破故紙腿痠腳軟加牛膝杜仲虛汗加白朮黃耆酸棗仁皮骨焦熱加地骨皮頭目眩暈加川芎夢遺加牡蠣椿根皮神砂噦加竹茹虛驚煩躁加神砂酸棗仁竹茹口苦舌乾加梔子烏梅乾葛棗二枚烏梅一個炒米一撮水煎不拘時服疰夏脈虛或數而無力腎水得藏至春無病今水氣大虧春乃萬物發生相火用事其病漸覺生矣至夏君火用事二火相搏疰夏之病大作令人腳弱食少頭痛發熱立秋之時金方用事腎水漸長稍覺精神來年又如此也乃陰虛元氣不足之故耳當以補中益氣滋陰救水之劑療之病人再寡嗜欲薄滋味使腎氣得勝下年再無復作之理也田氏考之曰疰夏為病前論甚明金匱鉤玄曰夏末秋初得之為疰夏似乎未通纂要春末夏初得之或者理明今不拘二者之論只宗六氣受病為主五行生剋為原全倚脈症為法予本後學豈敢變前賢之定規因二論不同所以立此一說也加減補中益氣湯黃耆一錢白朮五分當歸五分白芍五分陳皮五分甘草炙五分黃柏炒五分麥冬一錢五味子七粒人參五分水煎服八珍湯加減芍藥炒五分當歸酒洗五分南芎五分熟地酒洗五分白朮八分茯苓八分麥冬八分五味子三分甘草炙三分黃柏七分水煎服平補和中丸治四肢無力面色多黃頭目不清少食多倦立秋漸覺精壯此藥服之甚效當歸五錢白芍四錢南芎二錢白朮一兩陳皮五錢茯苓三錢甘草二錢人參五錢柴胡三錢黃柏炒三錢粳米粉打糊為丸如桐子大每服五十丸白湯下內傷內傷為病脈氣口緊盛內傷為病不足有餘二者兼之不可不明辯焉外症寒熱間作而不齊雖惡寒但得溫暖而即解口內不知穀味腹中不得和通言語懶怯先重後輕手心熱手背不熱東垣云辯法再無他惑蓋所謂聖醫也田氏考之曰內傷不足有餘何以分之如起居不常房勞感傷氣口脈雖緊無力此為不足之症法當參耆之類補之飲食過多氣不勝食脈緊有力此為有餘之病法當枳實之類消之又如外感之症左手是標右手是本先無形而後有形也內傷之症右手是標左手是本先有形而後無形也丹溪曰若內傷兼外感當用補中益氣湯加減隨經治之有外感重而內傷輕者先用發散而後補養有內傷重而外感輕者先用補養而後發散全倚脈症辯之庶為無差也補中益氣湯治內外傷相兼隨症加減發散之藥不足者補之方見丹溪纂要有各經加減法如太陽頭項痛腰脊強加羌活藁本桂枝陽明目痛鼻乾加葛根白芷升麻少陽胸脅痛耳聾加黃芩半夏川芎柴胡太陰腹滿咽乾加枳實厚朴少陰舌乾口燥渴不已加甘草桔梗知母厥陰煩滿囊縮加川芎變症發斑加葛根玄參石膏升麻遇症須詳細斟酌對病而施無不神效枳朮和中湯有餘者消之陳皮五分白朮八分甘草二分山楂三分枳實五分黃連五分神麯五分厚朴六分半夏五分茯苓四分姜三片水煎服傷食傷食者是因多餐飲食脾虛運化不及停於胸腹飽滿噁心惡食不食作噯作酸下泄臭屁或腹痛吐瀉重則發熱頭疼左手關脈平和右手關脈緊盛皆是傷食也初起一吐即寬若郁久不化成食積也脾胃論云飲食自倍腸胃乃傷應用香砂平胃散加減治之香砂平胃散加減治傷食香附砂仁蒼朮厚朴陳皮甘草枳殼木香藿香食肉不化加山楂草果米粉面食不化加陳曲麥芽生冷瓜果不化加乾薑枳實青皮去枳殼酒傷者加黃連乾葛烏梅吐瀉不止加茯苓白朮半夏烏梅去枳殼姜一片水煎不拘時服枳實大黃湯治胸腹積食成塊作痛大便不通者枳實厚朴大黃檳榔甘草痛甚加木香水煎空心熱服以利為度既止不可再服傷飲食脈氣口緊盛保命集曰人稟天地得五穀之精化五味之備故生形也經曰味歸形人若傷其味則形損也飲食太過腸胃不能勝氣不及化物故傷焉經曰壯火食氣氣食少火壯火散氣少火生氣又經曰飲食自倍腸胃乃傷或因房勞太過或失四時調養令人滿悶噁心噯氣聞五味就嘔吐見面食則噁心謂之傷食則惡食也日積月壘傳化失常臌脹水腫豈能免哉法當健脾伐木難經曰不治已病而治未病正謂此也田氏考之曰四時草木全賴土為主所謂真土神而無形偽土職而有象今土既虧在五穀不得收成在四時寒熱相反在人精血不生民必瘼疾豈得逃也凡人節飲食受納之司不失寡嗜欲作強之官大盛若如此源焉有是病加減平胃散治飲食致傷脾胃蒼朮厚朴陳皮半夏白朮黃連枳實神麯甘草山楂砂仁姜一片水煎服保和湯治內傷飲食胸膈痞滿此藥寬中和胃進食化痰陳皮半夏茯苓甘草連翹神麯山楂肉青皮白朮有熱加黃連姜一片水煎服保和丸治宿食不能克化山楂二兩陳皮五錢連翹五錢陳曲一兩半夏一兩蘿蔔子六錢微炒去皮茯苓一兩共為末水法為丸如桐子大每服五六十丸白滾水送下橘皮枳朮丸治痞消食養胃黃連七錢橘皮一兩半夏六錢枳實五錢白朮一兩五錢神麯五錢甘草二錢共為細末荷葉煮飯為丸如桐子大每服七十丸薑湯下脾胃脾胃者人以脾胃為主脾乃運化水穀胃乃受盛水穀大抵精氣血氣皆生於穀氣榮於五臟六腑右關脈緩是本脈也諸脈帶緩便是脾胃有力非止於關脈也脈中有力即為有神有神即有胃氣正是有胃氣曰生無胃氣曰死胃喜香燥而惡濕切忌腥穢生冷須用溫和調養不生諸病若是內傷飲食勞倦飢飽失時或六淫七情傷之致令脾胃不和不思飲食則口不知味胸腹飽悶不舒用香砂養衛湯加減若餐飲食胃口停寒食不消化者用香砂平胃散加減若吐瀉不止脾胃虛弱不進飲食者用參苓白朮散加減若脾胃虛寒嘔噦或吐瀉者用理中湯加減胃口作痛者用木香調中湯加減脾虛中滿腫脹用分消湯加減脾虛不思飲食食後倒飽者用香砂六君子湯加減若勞役之人明知飢餓勞力傷於脾胃發熱困倦者用補中益氣湯加減正謂勞者溫之損者補之溫能除大熱也內經云形不足溫之以氣精不足補之以味東垣內外傷辯惑論云內傷不足者飲食勞倦是也溫之補之調之養之皆是補也外感有餘者風寒暑濕是也瀉之汗之吐之利之皆為瀉也若內傷不足之症苟誤認外感有餘之症而反瀉之是實實虛虛損不足而益有餘醫殺之耳東垣脾胃論云脾胃俱實能食而肥過食不飢多食不傷脾胃俱虛不食而瘦與食則減食不與則不思飢飽不知也或少而肥者雖肥而四肢不舉蓋脾因邪氣勝也有能食而瘦者胃伏火邪於氣分則能食雖多而不生肌肉脾主思而有信思則脾氣健醒而思食有味若脾氣倦弱則不思飲食雖強食而不知味矣故經云胃為水穀之海水入於經其血乃成谷入於胃脈道乃通血不可不養衛不可不溫血溫衛和得盡天年矣又云安穀則昌絕谷則亡水去榮散谷消衛亡神無所依天年盡矣香砂養衛湯加減治脾胃不和不思飲食口不知味痞悶不舒香附砂仁蒼朮厚朴甘草陳皮人參白朮茯苓木香白豆蔻姜一片棗二枚水煎不拘時服香砂平胃散加減治胃寒多餐飲食不消胸腹飽悶香附砂仁蒼朮厚朴甘草陳皮水煎不拘時服脾胃寒加乾薑官桂肉食不化加山楂草果米粉面食不化加神麯麥芽生冷瓜果不化加檳榔乾薑胸腹飽悶加枳殼蘿蔔子大腹傷食作瀉加乾薑白朮烏梅傷食胃口作痛加木香枳實益智仁傷食噁心嘔吐加藿香丁香半夏烏梅乾薑理中湯加減治脾胃虛寒嘔噦或吐或瀉人參白朮乾薑甘草茯苓陳皮半夏厚朴砂仁官桂藿香寒極手足冷脈沉細加附子姜三片水煎不拘時服胃寒嘔吐噁心不止加丁香山藥烏梅炒米脾胃虛寒發呃加丁香茴香木香良薑去官桂脾胃虛寒瀉不止加炒山藥肉果蒼朮訶子烏梅脾胃虛寒作痛加丁香茴香益智去官桂半夏人參茯苓木香調中湯加減治胃痛木香砂仁厚朴陳皮香附甘草玄胡益智仁茴香枳殼草豆蔻痛不止加乳香沉香姜一片水煎服初起胃寒痛加乾薑官桂久郁胃脘痛加炒梔子山藥煨乾姜少許從治胃脘久痛大便結燥不通去益智香附草豆蔻加大黃下之此痛隨即減也若平日喜食熱物便是熱傷死血在胃口作痛加當歸桃仁紅花川芎芍藥丹皮去益智草豆蔻參苓白朮散加減治吐瀉不止脾胃倦弱不進飲食人參白朮茯苓山藥半夏陳皮甘草砂仁厚朴藿香蓮肉烏梅炒米夏月加扁豆姜一片棗二枚水煎不拘時服胃寒嘔吐不止加丁香乾薑胃寒瀉不止加乾薑官桂肉果訶子去半夏厚朴胃熱煩熱嘔噦噁心不止加炒黃連梔子竹茹烏梅脾胃熱瀉不止加炒蒼朮炒芍藥梔子訶子烏梅去厚朴半夏脾胃飽悶加木香磨用白豆蔻益智去山藥烏梅炒米中滿分消湯加減治脾虛發腫飽悶成中滿蒼朮厚朴陳皮枳殼砂仁木香茯苓白朮香附豬苓澤瀉大腹皮若胸腹脹滿加蘿蔔子木通去澤瀉胸腹飽悶加蘇子桑白皮去白朮茯苓小便短赤加梔子滑石車前子木通去澤瀉白朮瀉加炒山藥車前子炒蒼朮白朮芍藥去枳殼脅下若痛加青皮惡寒手足冷加官桂少許大便燥結加當歸火麻仁姜一片蘿蔔子燈心各一撮水煎服香砂六君子湯加減治脾虛不思飲食食後倒飽香附砂仁人參白朮茯苓半夏陳皮厚朴木香白豆蔻益智仁胃口虛寒嘔吐不止去木香益智仁加丁香藿香即藿香安胃散薑棗煎服木香枳朮丸治脾胃症胸腹飽悶不舒木香枳實白朮白豆蔻砂仁厚朴香附橘紅甘草共為末糯米粉荷葉煎湯打糊為丸如桐子大每服五十丸清米湯下寒月淡薑湯下脾虛食後倒飽本方有白豆蔻即豆蔻枳朮丸脾虛飲食不化飽悶胃口作痛加神麯山楂麥芽即曲糵枳朮丸脾虛飲食不化胸腹滿脹本方有香附砂仁即香砂枳朮丸胸中痰氣阻塞滿悶本方加瓜蔞蘇子半夏姜水打糊糯米粉糊為丸淡薑湯下即橘半枳朮丸補中益氣湯加減治內傷脾胃勞倦發熱人參黃耆白朮當歸陳皮升麻柴胡甘草胸腹脹滿加砂仁枳實木香去黃耆升麻姜一片棗二枚烏梅一個水煎溫服痰飲痰者人身之痰貴乎順行隨氣升降無處不到設若氣逆阻其道路為喘為咳為嘔噦為眩暈為驚悸為健忘為不語為狂言為癲呆為厥逆為怔忡為嘈雜為串痛為糜為流注為腫塊為痰核為痰氣為痰結為痰燥為痰話為痰悶為痰火為寒為熱皆是痰之為患各有治法諸病以化痰為先善治痰者兼治氣氣順則痰自利痰脈浮滑者宜降浮實者宜吐沉小者不宜吐恐虛故也凡治痰症不可全用利藥過多使脾胃虛弱則痰反易生而多若脾虛生痰者用健脾燥濕俱要利補兼用陳皮白朮為佐也痰乃穢濁之物宜吐不宜留留則反生別病矣治痰要藥黃芩治熱痰黃連梔子降火痰蒼朮白朮治濕痰半夏治寒痰南星治風痰貝母治稠痰海石粉連翹治老痰瓜蔞仁治結痰蘇子砂仁降氣痰枳實降痰能沖牆壁痰在脅下非白芥子不能達痰在四肢非竹瀝不能到痰在皮膚膜外非竹瀝不能除痰在胸膈間非竹瀝不能化氣虛之人有痰非竹瀝不能開血虛之人有痰非竹瀝不能補竹瀝治陰虛降火痰家聖藥胎前損子產後無礙竹瀝性溫實非寒也世俗不知竹瀝甚妙恐其性寒而不用誤之甚矣若大便不實或瀉者或手足冷者或嘔吐寒痰或脈息沉細者或脘腹腫痛者俱不可用竹瀝其餘痰症皆當用之不必慮也凡用竹瀝加薑汁少許竹瀝非薑汁不能行經絡也二陳湯加減茯苓陳皮半夏甘草姜三片水煎不拘時服咳嗽有白痰乃肺感風寒風寒者遇風冷即發痰多咳嗽是也寒痰加乾薑官桂風痰加南星防風枳實桔梗食積痰者多餐飲食郁久成痰小兒多有此症加山楂神麯砂仁香附嗽吐綠痰者脾胃有濕也加蒼朮白朮山藥砂仁痰氣者胸膈有痰氣脹滿也痰在咽喉間如綿絮如梅核咯不出咽不下或升或降塞礙不通亦痰氣也後成膈噎病加砂仁香附瓜蔞枳實蘇子當歸桔梗貝母去半夏痰飲者痰在胸脅間痛而有聲也痰飲與死血皆窠囊加蒼朮瓜蔞枳實木香砂仁當歸香附川芎青皮白芥子治痰飲極效痰涎症者凡人身胸背脅痛不可忍或牽引釣痛手足冷痹者是痰涎在胸膈也加白芥子砂仁木香枳實當歸茴香蒼朮酒炒黃芩香附濕痰流注症者凡人骨體串痛或作寒熱發腫塊皆是濕痰流注經絡也加瓜蔞枳實蒼朮酒炒黃芩羌活防風連翹當歸香附砂仁木香紅花竹瀝薑汁少許有熱加柴胡上痛加川芎白芷下痛加黃柏牛膝塊痛加乳香若項頸痛加威靈仙痛塊腫外用皮硝五倍子大黃南星為細末醋調敷腫塊上漸漸自消不散則成膿矣痰核症者人身上下結核不散者是痰核也或發腫塊者是痰塊也與濕痰流注同治法大凡治痰塊流注痰核俱加皂角刺引藥至痰處濕痰加蒼朮白朮砂仁香附枳實桔梗熱痰加黃芩梔子貝母枳實桔梗麥冬竹瀝去半夏痰火加炒黃連砂仁乾葛烏梅桔梗貝母去半夏脾虛生痰加白朮人參白芍枳實桔梗砂仁痰喘氣急加蘇子桑白皮瓜蔞仁枳實砂仁木香貝母竹瀝薑汁去半夏痰氣串痛加砂仁木香茴香瓜蔞仁白芥子枳實羌活茯苓蒼朮當歸川芎竹瀝薑汁去半夏痰症發熱咳嗽生痰者加柴芩麥冬五味子知母貝母杏仁桑白皮當歸桔梗竹瀝去半夏項背骨節痛皆是痰氣與風濕也老痰加枳實瓜蔞海石粉連翹黃芩桔梗竹瀝去半夏咳嗽咯吐黃痰者肺胃有熱也久不愈成肺痿口吐癰膿或痰血作腥臭者難治也加瓜蔞枳實桔梗黃芩梔子貝母天冬桑白皮杏仁蘇子竹瀝去半夏飲酒嘔噦吐痰加砂仁烏梅咯吐黑痰或成塊者因勞傷心腎故也此是久郁老痰與老痰同治滋陰降火湯方載虛怯症條內治痰火症發熱咳嗽吐紅痰者即血痰也痰中帶血者難治痰火者即熱痰也痰因火動逆上清痰降火為先久病陰火上升津液生痰不生血宜補血治相火其痰自除咽喉腫痛喉舌下拖喉痛乾燥或生瘡咽喉紅腫亦痰火也俱用滋陰降火湯加減治之竹瀝不可缺也瓜蔞枳實湯加減治痰結咯吐不出胸脅作痛不能轉側或痰結胸膈滿悶痛作寒熱氣急並痰迷心竅不能言語並皆治之瓜蔞仁枳實桔梗茯苓貝母陳皮甘草片芩山楂梔子當歸砂仁木香竹瀝痰迷心竅不能言語加菖蒲去木香氣喘急加蘇子桑白皮姜一片水煎服外用姜椇揉痛處痰結症痰在胸脅不化元氣虛弱津液乾燥咯難得出發喘嗽急身熱痛難轉側者是痰結也脅下有痰作寒熱咳嗽氣急作痛者亦痰結也服藥後咯吐痰出為效若咯痰不出氣鬱發喘不睡喉下漉漉有聲喘急痰咯不出者難治也溫膽湯加減治痰燥痰話驚惕失神並神不守舍茯苓半夏陳皮枳實當歸竹茹酸棗仁人參白朮神砂麥冬梔子甘草炒黃連竹瀝姜一片棗二枚烏梅一個水煎調神砂服痰燥者痰火作熱煩躁也痰話者痰火作熱驚惕不安錯語失神也痰迷心竅神不守舍因憂慮鬱結驚恐傷心心不自安神出舍空則生痰矣使人癲狂煩亂悲歌叫罵奔走不識人者俱用溫膽湯加減治之黃芩湯加減治上部痰火黃芩貝母梔子天冬麥冬茯苓陳皮甘草當歸杏仁桔梗桑白皮氣急加蘇子姜一片棗二枚水煎入竹瀝服六郁六郁者鬱結而不散也人之氣血沖和百病不生若有鬱結諸病生焉氣鬱者腹脅脹滿刺痛不舒脈沉者用木香順氣散加減血鬱者能食便紅或暴吐紫血痛不移處脈澀數者用當歸活血湯加減食鬱噯氣作酸胸腹飽悶作痛惡食不思飲食右關脈緊盛者用香砂平胃散加減痰鬱者動則喘滿氣急痰咳不出胸膈結痛脈沉滑者用瓜蔞枳桔湯加減熱鬱即火鬱也小便赤色五心煩熱口苦舌乾脈數者用火鬱湯加減濕鬱者周身骨節走注疼痛遇陰雨即發脈沉細而濡用滲濕湯加減木香順氣散加減治氣鬱木香烏藥香附枳殼青皮砂仁厚朴陳皮官桂甘草撫芎蒼朮姜三片水煎磨木香調服當歸活血湯加減治血鬱當歸芍藥撫芎桃仁紅花丹皮官桂乾薑香附烏藥枳殼青皮甘草血結硬痛加大黃姜一片水煎不拘時服香砂平胃散加減治食鬱厚朴枳實陳皮甘草蒼朮香附砂仁山楂神麯麥芽乾薑木香食鬱久成塊作痛去乾薑加大黃一分姜三片蘿蔔子一撮水煎磨木香調服瓜蔞枳桔湯加減治痰鬱瓜蔞仁枳實桔梗撫芎蒼朮香附杏仁砂仁片芩木香陳皮甘草貝母竹瀝姜一片水煎磨木香同竹瀝衝入藥內調服火鬱湯加減治熱鬱梔子柴胡乾葛白芍地骨皮連翹甘草水煎不拘時服滲濕湯治濕鬱方見濕症條內六郁氣鬱脈沉澀血鬱脈沉痰鬱寸口沉滑濕鬱脈沉細熱鬱脈沉數食鬱氣口緊盛論曰氣血沖和百病不生一有怫鬱諸病生焉郁者結聚不散之故當升不升當降不降升降不得變化失常六郁病見矣胸脅痛者氣鬱也周身走痛陰寒則發濕鬱也動則喘急咳嗽吐痰痰鬱也四肢發熱小便赤黃火鬱也肢體無力雖食便血血鬱也噯氣吞酸腹飽懶食食鬱也人之性命非此不能為害田氏考之曰郁之為病非一端也諸病皆起於鬱結治法不可拘此六者且如傷寒而風寒藏於皮毛令人發熱惡寒傷暑而風熱中在肉分使人身如刺痛皆是鬱結之病看在何經隨症治之內經六元正紀大論曰又有五氣之郁治法不同木鬱吐之火鬱汗之土鬱下之金鬱解表利小便水鬱折之以治其沖逆治郁之法不過此也立方於後開鬱和中湯治六郁陳皮半夏茯苓各等分甘草少許前胡梔子炒香附童便浸川芎枳殼白朮黃芩神麯黃連各等分姜三片水煎服越鞠丸古方治鬱結用香附蒼朮神麯川芎梔子仁各等分水泛為丸如綠豆大每服七十丸白湯下火鬱湯方見前咳嗽咳嗽傷風也因肺感風寒新嗽鼻塞聲重脈浮緊者是傷風嗽也先服芎蘇飲後服清肺散加減初感冒風寒咳嗽而聲啞者是寒包熱也與久嗽聲啞者不同火嗽者有聲痰少面赤身熱脈數者乃火嗽也干嗽無痰者是肺郁火邪在肺難治冷風嗽者遇風冷即發痰多喘嗽是也用三物湯加減勞嗽者盜汗出痰多作寒熱脈數大無力者是勞嗽也大抵火嗽勞嗽干嗽三症皆是勞力酒色內傷或憂思鬱結陰勞火動而嗽俱用滋陰降火湯加減久嗽不止成勞怯若久嗽聲啞或咽痛生瘡者是火傷肺金也俱是難治之症年老之人氣血衰敗聲啞失音者亦難治用清肺湯加減治之痰嗽者嗽動便有痰聲痰出嗽止是也嗽則痰多者是脾虛用清肺飲加減治之嗽而胸脅結痛者是痰結用瓜蔞枳實湯加減治之肺脹嗽者嗽則喘滿氣急是肺脹嗽也喘急不得眠者難治用清肺湯加減治之食積痰者痰嗽如膠也用瓜蔞枳實湯加減治之早晨嗽者胃中有食積上半日嗽多者是胃中有火午後至夜嗽多者屬陰虛黃昏嗽者火氣浮肺少加涼藥春是上升之氣夏是火炎上最重秋是濕熱傷肺冬是風寒外來芎蘇散加減治初感風寒新嗽鼻塞聲重頭痛發熱惡寒脈浮緊者川芎蘇葉乾葛白芷防風香附陳皮細辛甘草柴胡身痛加羌活春加防風夏加黃芩秋加蒼朮冬加麻黃蔥頭二個姜一片水煎不拘時服清肺飲加減治一切咳嗽茯苓陳皮貝母甘草人參當歸麥冬五味子杏仁桔梗黃芩梔子桑白皮姜一片棗二枚水煎食遠溫服痰咯不出加瓜蔞枳實竹瀝去五味子人參咳嗽喘急加蘇子竹瀝去人參桔梗痰火嗽面赤身熱咯出紅痰者加芍藥生地天冬紫菀阿膠竹瀝去人參五味子貝母杏仁桔梗久嗽虛汗多者加白朮芍藥生地去桔梗貝母杏仁久嗽喉痛聲不清者加天冬薄荷紫菀生地竹瀝去貝母五味子人參久嗽不止加款冬花紫菀天冬去桔梗杏仁貝母嗽而痰多者加白朮天冬金沸草去桔梗杏仁黃芩咳嗽午後至夜發熱者加知母黃柏生地芍藥去黃芩貝母五味子杏仁再加竹瀝調服咳嗽身熱加柴胡咳嗽痰結脅下痛者加白芥子枳實砂仁木香茴香竹瀝薑汁少許去人參五味子貝母杏仁梔子再加柴胡引用滋陰降火湯方載虛症條內瓜蔞枳實湯方載痰症條內人參款花膏治虛久嗽服之人參桑白皮五味子紫菀熟地款冬花共為末煉蜜為丸如雞豆大每服一丸臨睡清米湯下春乃上升之氣宜潤肺抑肝川芎芍藥半夏麥冬黃芩知母夏得火熱炎上最重宜清金降火桑白皮知母石膏麥冬黃芩秋因濕熱傷金宜清熱瀉濕蒼朮桑白皮防風黃芩梔子冬受風寒外感宜解表行痰麻黃桂枝半夏乾薑防風此乃四時之主藥隨症加減周蘭谷曰當頭一味藥正此之謂歟咳嗽脈滑數者實也數而無力者虛也浮濡者生沉伏者死咳嗽二字實非一病有聲無痰為之咳有痰無聲為之嗽有聲有痰為之咳嗽各受病不同也如風寒在肺使人鼻塞身重當發散行痰為主喘嗽遇冬則發為寒包熱也解表除熱為主火嗽有聲少痰面赤是也當降火清金為主勞病久不愈者陰火上衝熏蒸清道而作咳嗽當滋陰降火為主田氏考之曰氣受病多咳血受病多嗽氣血俱病有聲有痰為之咳嗽丹溪曰又有痰鬱火邪在肺令人乾咳不得志人受此病也治嗽之法詩括甚詳痰有五種何以分之風熱氣寒溫所臻咳嗽者有聲無痰生薑麻黃與杏仁五味防風並桔梗甘草同煎效若神無聲有痰須改劑白朮半夏同五味枳殼甘草及防風六味同煎治有聲有痰則不同術夏五味及防風若治咳嗽久不愈枳殼阿膠最有功寧肺化痰湯治風寒在肺使人鼻塞聲重此藥服之最效夏月忌服陳皮半夏茯苓甘草杏仁麻黃前胡枳殼桔梗黃芩梔子姜三片水煎服參蘇飲加減治遇冬則寒包熱也陳皮半夏茯苓甘草桔梗麻黃白朮防風葛根杏仁紫蘇川芎姜三片水煎服清火化痰湯治面赤火嗽陳皮半夏茯苓甘草黃芩瓜蔞仁青黛香附杏仁前胡枳殼梔子貝母石膏姜三片水煎服滋陰寧肺湯治勞嗽陳皮貝母茯苓甘草知母梔子麥冬地骨皮五味子阿膠當歸川芎杏仁竹瀝水煎服喘症喘者喘為惡候因火所郁而痰在肺胃也痰喘者喘動有聲用瓜蔞枳實湯加減火喘者乍進乍退得食則減食止則喘用清肺湯加減氣短者呼吸短促而無痰聲用四君子湯陰虛火動而喘者脈必數用滋陰降火湯加減寒喘四肢厥冷脈沉細用理中湯加減久喘未發時用參歸五味扶正氣為主新喘已發時用沉香蘇子桑白皮攻邪為主喘急甚虛者不可驟用涼藥須加溫散若汗出如油喘而不休皆死症瓜蔞枳實湯加減治痰喘方載痰症條內清肺湯加減治火喘黃芩山梔枳實桑白皮茯苓陳皮杏仁蘇子貝母沉香神砂麥冬姜一小片水煎加入竹瀝調服香砂六君子湯加減治胃虛喘香附砂仁人參白朮茯苓陳皮厚朴枳實蘇子桑白皮沉香木香甘草姜三片水煎磨入木香調服四君子湯加減治短氣人參白朮茯苓甘草砂仁陳皮厚朴蘇子桑白皮當歸木香沉香姜一片棗二枚水煎磨人木香不拘時服理中湯加減治寒喘砂仁乾薑甘草蘇子沉香木香厚朴官桂陳皮脈細手足冷加附子姜三片水煎磨入木香不拘時服治陰火動而脈數者方載虛怯條內本方加蘇子沉香杏仁桑白皮竹瀝喘脈浮滑者生短澀者死痰喘為病非一方可治非一言可述有痰盛而作喘者有氣急而作喘者有胃弱而作喘者有火炎上而作喘者各有其症從而處治然後可也如喉中有痰聲是痰喘也呼吸急促無痰聲是氣急喘也抬眉擷肚而不休者是胃虛喘也乍進乍退食入則減食已則復是火炎上喘也殊不知實火在胃鬱而不散不得發越也熏蒸清道而作喘者亦有之也當急法則可勿令緩田氏考之曰咳出五臟嗽發肺腎所謂言其本也凡臨此症急治其標緩治其本前論甚明有痰者化痰降氣為主有氣急者順氣降火為主有火炎上者降心火清肺金為主久喘者未發扶正氣為主已發以攻邪為主不可單用苦寒之藥惟苦溫之劑可也寧喘化痰湯陳皮半夏茯苓杏仁黃芩麻黃桑白皮石膏阿膠各等分甘草少許姜三片水煎服千緡湯治痰喘不能臥人扶而坐數日一服即安半夏七個每一個切作四片湯泡七次甘草一寸炙皂角一寸炙去皮子南星一錢生薑五片一方加雄黃無甘草大治痰清金勝火湯治火炎上作喘半夏陳皮茯苓各一錢甘草三分桔梗黃芩黃連蘇子各七分前胡知母梔子枳殼杏仁各六分姜三片水煎服枳朮二陳湯治胃虛而作喘陳皮半夏茯苓白朮枳實黃連香附米人參白芍各七分蘇梗五分甘草三分姜三片水煎服瘧疾瘧者外因風寒暑濕內傷飲食勞倦或飢飽色欲過度以致脾胃不和痰留中脘無痰不成瘧脾胃屬土有信來去不失其時若移時早晚是邪無容地瘧將好也瘧痰來時呵欠怕寒手足冷發寒戰大熱口渴頭痛骨節腰胯痠疼或先寒後熱或先熱後寒或單寒單熱或熱多寒少或熱少寒多一日一發受病淺也易治間日一發者或二日連發住一日者皆難治之瘧大抵瘧脈多弦弦而數者多熱弦而遲者多寒弦而緊實者宜下弦而虛細者宜補弦而實大者宜吐瘧脈遲緩者病自愈久瘧不愈者脈必虛宜養正去邪無汗者要有汗散邪為主有汗者要無汗補正氣為主凡治瘧先服人參養胃湯加減以後方可截之虛弱人用參歸截瘧飲壯健人用常山七寶飲寒多者加桂枝熱多者加柴芩久不止者用服如聖飲紫金丸以後方可服參歸養榮湯調養氣血若用截藥吐出黃膠水者瘧自愈也不可一二日早截早則邪氣閉塞而壞症又不可遲截遲則邪氣衰憊而成虛怯當以三四日就截為妙須待熱退身涼方可飲食也痰瘧者是老瘧也是風暑入陰在臟用柴胡芎歸湯引出陽分則散長夏煩渴熱甚者是暑瘧用人參養胃湯加香薷扁豆痰多者是痰瘧用人參養胃湯去人參加貝母竹瀝飽悶惡食不食者是食瘧用人參養胃湯去人參加山楂神麯青皮勞倦汗多脈虛大者是勞瘧用人參養胃湯加黃耆當歸白朮去蒼朮身重小便澀是濕瘧用人參養胃湯加白朮以後俱用人參截瘧飲加減截之吞紫金丸亦可切不可帶熱飲食恐不消而成痞塊一名瘧母痞散成臌者有之矣人參養胃湯加減治暴瘧初起服此二帖後用人參截瘧飲常山七寶飲截之人參茯苓半夏厚朴蒼朮藿香陳皮草果甘草當歸川芎寒多加桂枝熱多加柴胡黃芩虛汗多去蒼朮藿香川芎加白朮黃耆飽悶加青皮砂仁去人參渴加麥冬去半夏瀉加炒白朮芍藥如不止加肉果去厚朴草果嘔噦加白朮山藥炒米砂仁去草果厚朴蒼朮痰多加貝母竹瀝去半夏草果骨體痛加羌活芍藥去草果內熱加炒黃芩去半夏長夏暑熱盛加香薷扁豆去半夏藿香姜一片棗二枚烏梅一個水煎不拘時服人參截瘧飲加減治一切瘧疾俱可截之虛人亦服人參白朮茯苓當歸青皮厚朴甘草知母柴胡黃芩桔梗常山草果鱉甲烏梅加減俱照人參養胃湯後加減法同姜一片棗二枚桃仁七粒酒煎不飲酒人水煎亦可煎好露一宿臨發日空心服渣再煎午後用糖拌烏梅送下忌食雞魚豆腐麵食並忌勞力怒氣房事常山七寶飲加減治壯健人瘧疾服之可截常山草果檳榔青皮厚朴知母蒼朮甘草鱉甲烏梅汗多加白朮去蒼朮熱多加柴胡黃芩寒多加桂枝口渴加麥冬天花粉痰多加貝母姜一片桃仁七粒酒少許煎好露一宿臨發日五更服渣再煎午前服參耆鱉甲飲治老瘧腹脅有塊成瘧母人參黃耆鱉甲當歸茯苓白朮青皮厚朴香附撫芎砂仁山楂枳實甘草塊痛加木香去白朮姜一片烏梅一個棗二枚水煎食遠服如修合丸藥加阿魏醋煮烊和藥末內用水醋少許打麵糊為丸如綠豆大每服三十丸空心清米湯下參歸湯治瘧疾截住後用此藥調養氣血人參當歸茯苓白朮陳皮厚朴砂仁甘草山藥蓮肉芍藥熟地虛熱虛汗加黃耆去砂仁棗二枚水煎不拘時服人參竹瀝飲治虛瘧昏倦汗多痰盛舌火言語混亂不清脈虛大無力人參白朮茯苓當歸生地麥冬酸棗仁知母陳皮芍藥甘草烏梅大棗竹瀝姜一片水煎不拘時漸漸服柴胡芎歸湯治夜間陰瘧引出陽分則散後服人參截瘧飲止之柴胡川芎當歸桔梗芍藥厚朴人參乾葛白朮陳皮茯苓紅花甘草姜一片棗二枚烏梅一個水煎食遠溫服截瘧如聖飲人參三錢常山三錢甘草三分丁香廿四粒好黃酒半碗烏梅一個煎好露一宿臨發日五更溫服用糖拌烏梅過藥烏梅時時可食之截瘧紫金丹秘傳神妙紫河車五錢甘草二錢人參三錢黃連二錢人言一錢神砂三錢綠豆一兩五錢各研細末端午日午時將粽子搗爛如泥和藥搗千餘下為丸如白豆大金箔為衣臨發日五更用無根水服三丸小兒服一九忌雞魚羊肉豆腐麵食雄黃截瘧丸雄黃三錢辰砂三錢人言一錢甘草二錢綠豆粉一兩五錢各研細末豆粉打糊為丸如白豆大辰砂為衣臨發日五更無根水服二丸小兒一丸如久不止每日灸後谿穴三壯最妙瘧脈弦數多熱弦遲多寒夏傷於暑或痰有食秋必瘧痢久則羸瘦如凌瘧之狀故名曰瘧也三日一發受病一年間日一發受病半年一日一發新病所以連二日發住一日者氣血俱病或用截法或隨經治先傷於寒而後傷於風者先寒後熱也名曰寒瘧先傷於風而後傷於寒者先熱後寒也名為溫瘧但熱而不寒者名曰癉瘧但寒而不熱者名曰痎瘧初則不知何經受之在太陽經脈弦緊為之風瘧治多汗之在陽明經脈弦長為之熱瘧治多下之在少陽經脈弦細為之風熱瘧治多和之此三陽受病為之暴瘧在夏至後處暑前發之淺者近而暴也在陰經不分三經總謂之溫瘧當從太陰經論之若夏至前處暑後而發此乃傷之重者遠為之痎瘧痎者三日一發陰受病為之老瘧也田氏考之曰凡人治瘧不分經絡不察寒熱不憑六脈妄用局方豈有求效之理以致久而不愈兩脅成塊名為痎瘧醫殺之耳真可惜哉丹溪曰無汗要有汗有汗要無汗扶正氣為主仲景曰或有煩躁小便赤澀素有瘴氣不服水土嘔吐不止又有大便閉而不通皆有治法予取諸家之議論纂為一篇對症用藥無不效也小柴胡知母葛根湯治先熱而後寒柴胡半夏黃芩甘草人參知母葛根姜三片水煎服柴胡參桂湯治先寒而後熱柴胡人參肉桂少許半夏黃芩甘草葛根姜三片水煎服加減白虎湯治但熱而不寒石膏知母甘草人參麥冬黃芩貝母粳米一撮水煎服柴胡桂薑湯治但寒而不熱柴胡二兩肉桂三錢天花粉一兩黃芩五錢乾薑五錢甘草五錢牡蠣五錢每服五錢水煎服五苓散治煩躁小便澀黃素有瘴氣方見霍亂門大柴胡湯治大便閉結方見傷寒門常山飲方見丹溪纂要清脾湯方見丹溪纂要痢疾痢疾者不分赤白俱作濕熱治之明矣赤屬血白屬氣赤白相兼膿血相雜痢皆因脾胃失調飲食停滯積於腸胃之間多是暑濕傷脾故作痢疾起於肚腹疼痛大便裡急後重小水短赤不長身涼脈緩者易治身熱脈弦急者難治痢疾初起元氣壯實一二日先用化滯湯疏通積滯三四日已後元氣虛弱用胃苓湯加減治之如不止用參歸芍藥湯調理脾胃分理陰陽久不愈方可服真人養臟湯加減治之切不可用粟殼等藥止塞太早內恐積氣未盡成休息痢亦恐毒氣攻上胸腹飽悶作痛噁心嘔噦發呃難治者因毒氣攻胃也噤口痢不食者胃口熱極用參歸芍藥湯加炒黃連蓮肉人參炒米烏梅清熱開胃為下痢腹痛裡急後重者是積氣滯用加木香砂仁和消積氣則後重自除若久痢後重不除者是虛氣墜下也加人參當歸白芍升麻為臣提氣大孔痛者熱流下也用加炒黃芩白芍清之痢後發熱不止者或積小但虛坐努責俱是血氣虛倍加白芍當歸熟地滋養陰血其熱自安若積中有紫血者是瘀血也用加白芍紅花活血生血則便自愈痢下如綠豆汁者濕也用加炒蒼朮白朮滲濕利小便先水瀉後膿血者腎傳脾難愈先膿血後水瀉者是脾傳腎易愈有痢下如鮮血如露色者如屋漏水者大孔如竹筒者嘔噦發呃煩躁者俱難治也如魚腦者身熱脈數大者半死半生也大抵治痢一二日元氣未虛宜疏通積滯分理陰陽調養脾胃為主經云行血則便自愈調氣則後重除痢疾之脈宜沉細而緩不宜浮洪宜滑大而不宜弦急此夏傷於暑秋必瘧痢矣木香化滯湯加減治痢疾一二日用此一服即去枳殼木香當歸芍藥枳殼厚朴砂仁黃連陳皮甘草蒼朮夏月傷暑加香薷扁豆燈心一分蓮肉七個烏梅一個水煎不拘時服胃苓湯加減治痢疾三四五六日用此分理陰陽調養脾胃當歸芍藥茯苓蒼朮白朮厚朴陳皮砂仁甘草豬苓澤瀉盛暑加扁豆去後多除去厚朴腹痛加木香少許痛甚加乳香茴香煩渴加人參乾葛麥冬烏梅去厚朴嘔噦噁心加蓮肉烏梅炒米黃連虛汗加人參去蒼朮厚朴飽悶加木香少許去白朮噤口不食加蓮肉烏梅炒米黃連煩躁加神麯烏梅黃連人參竹茹蓮肉炒米梔子麥冬去厚朴砂仁蒼朮元氣倦弱加人參去厚朴砂仁發熱加柴胡大便痛下鮮血加黃連地榆膿血相雜加烏梅阿膠去厚朴砂仁發呃加炒黃連蓮肉烏梅神砂茴香沉香去蒼朮白朮惡寒手足冷加官桂少許不可多服加人參以扶元氣白痢加山藥烏梅蓮肉七粒烏梅一個炒米一撮燈心一分水煎不拘時服參苓芍藥湯治痢疾一二日至七日痢去多不止用此調理人參當歸芍藥茯苓白朮砂仁山藥陳皮甘草口渴膿血不止加炒黃連飽悶加厚朴蒼朮白朮腹痛加乳香茴香木香少許裡急後重虛氣墜下加升麻少許若痢後去多不止不腹痛不飽悶不噁心方可加肉果訶子止後若腹痛飽悶噁心者不可用訶子肉果止塞只可加炒蒼朮炒蓮肉烏梅山藥炒米小便短赤加燈心黃柏黃芩豬苓木通梔子車前子久痢不止身涼脈沉細手足冷屬臟寒無血積方可用煨乾姜加官桂一二分如不口渴不煩熱去乾薑加官桂一分熟附子訶子肉果各等分一服即止不可多服即真人養臟湯也如口燥煩渴腹痛飽悶痢下即血脈弦數大者切不可用肉果訶子粟殼雖云久痢不止屬臟寒亦不可用乾薑附子熱藥烏梅一個燈心一分蓮肉七個水煎服實腸散治痢疾去多不分赤白用此末藥換出黃糞山藥一兩炒黃色蓮肉一兩去心炒燥炒黃米一撮共研細末用砂糖湯調服後用清湯漱口常服最妙香連丸加減治初起痢疾不分赤白調和積滯久痢不宜用與前木香湯同功黃連一兩茱萸拌炒赤色去茱萸用黃連木香二錢五分砂仁二錢甘草一錢各為細末水醋各半打麵糊為丸如綠豆大每服五十丸用燈心米煎湯送下湯泡飲治久痢不止不分赤白俱可服之粟殼三錢蜜水炒烏梅一個去核甘草二錢蜜三匙共研末熱滾湯一鍾泡浸一時辰去渣作三次服痢脈微小者生浮大者死痢因濕熱日夜無度名曰痢疾或因飲食積滯治可宣通為主勿可澀住也若濕熱傷血自小腸而來為之赤痢濕熱傷氣自大腸而來為之白痢赤白同下氣血俱傷雖有赤白二色終無寒熱之分皆是濕熱為病與婦人赤白帶下相同也日久不愈令人腹痛後重窘迫裡急若用澀藥恐成休息痢也初得之時元氣未衰當宜下之經所謂通因通用也下後氣虛補氣血虛補血日久正氣已衰不可下也只要除濕清熱健脾調氣為主然後行血則便自安也經曰先痢而後泄者腎病傳脾易治先泄而後痢者脾病傳腎難治相傳之法不可不知也田氏考之曰夏傷於暑秋必痢疾當秋金旺之時而伏暑在內金被火傷所謂肺受病而傳大腸為之白痢若金氣全勝旺不受邪心自受之傳於小腸為之赤痢若赤白同下濕熱大勝氣先受之則血難免經曰氣熱則血熱自然之理也丹溪曰凡治痢者必用寒以勝熱苦以燥濕少加辛熱佐之以為發散開通之用如腹痛者須用白芍甘草為君當歸白朮為佐惡寒加肉桂惡熱加黃柏達者更能參歲之用則萬舉萬全也大承氣湯治初痢此藥下之方見傷寒門芍藥湯治下血調氣經曰泄而便膿血氣行而血止行血則便自愈調氣則後重自除芍藥當歸黃連檳榔木香甘草大黃黃芩每服五錢水煎服香連丸治下痢膿血相雜黃連二十兩同茱萸十兩拌炒赤色去茱萸用黃連木香四兩八錢不見火共為細末醋打麵糊為丸每服二十丸清晨白湯下一方加蓮肉八兩除濕補中湯治久痢虛弱用此調之人參白朮茯苓甘草芍藥神麯升麻蒼朮防風黃連當歸木香檳榔水煎服泄瀉泄瀉者只因脾胃虛弱飲食飽飢過度或風寒暑濕所傷皆成泄瀉悠悠腹痛瀉無休止其色青脈沉遲者是寒瀉用理中湯加減大瀉即熱瀉也用芍藥湯加減暑瀉者暴瀉如水面垢脈虛煩渴自汗是用香薷飲加減濕水多而腹不痛腹如雷鳴脈細者是用五苓散加減風濕者瀉而便帶清血脈浮弦者是用胃風湯加減食積瀉者腹痛甚而瀉瀉後痛減脈弦緊者是也用香砂平胃散加減痰瀉者或多或少或瀉或不瀉脈沉滑者是也用二陳湯加減氣虛瀉者飲食入胃即瀉水穀不化脈微弱者是也用參苓白朮散加減滑瀉者日夜無度腸胃虛寒不禁脈沉細者是也用八桂散加減脾瀉者食後倒飽瀉去即寬脈細者是也用香砂六君子湯加減泄瀉之症治須分利小水健脾燥濕為主若瀉久多而不止者當補住為要若瀉不止手足寒脈虛脫煩躁發呃氣短目直視昏冒不識人也皆死症若瀉初起不可就用補塞恐積滯未盡而成腹痛飽悶噁心煩躁發呃而直待瀉去四五次方可補住此治之大法也理中湯加減治寒瀉人參白朮乾薑甘草茯苓良薑官桂陳皮藿香寒極是冷脈沉細加附子去良薑官桂飽悶加厚朴砂仁去人參白朮良薑腹痛加砂仁厚朴木香去人參虛汗加黃耆去藿香官桂嘔噦噁心加丁香半夏去良薑官桂瀉不止加蒼朮山藥瀉多久不止加肉果訶子去官桂良薑姜三片烏梅一個燈心一分水煎不拘時服四苓散治火瀉茯苓白朮豬苓澤瀉蒼朮山藥芍藥梔子陳皮甘草飽悶加厚朴砂仁去山藥腹痛加厚朴砂仁茴香木香去白朮嘔噦噁心加藿香烏藥蓮肉砂仁人參小便短赤加木通車前去澤瀉口燥煩干加黃連麥冬乾薑蓮肉烏梅去澤瀉蒼朮瀉多元氣虛弱昏倦加人參黃耆去澤瀉蒼朮夏月盛暑加扁豆香薷瀉多煩躁加炒黃連人參神麯烏梅去澤瀉蒼朮瀉多不止加肉果烏梅人參去澤瀉梔子發熱脈數加柴胡烏梅炒黃芩烏梅一個燈心一分水煎不拘時溫服五苓散加減治濕瀉茯苓白朮豬苓澤瀉官桂陳皮蒼朮山藥砂仁肉果訶子烏梅本方隨症加減與理中湯同姜三片烏梅一個燈心一分水煎溫服參苓白朮散加減治氣虛瀉人參茯苓白朮山藥砂仁藿香陳皮甘草乾薑蓮肉烏梅訶子肉果夏月加扁豆元氣虛弱加黃耆升麻少許去砂仁藿香飽悶加厚朴去肉果訶子小便短澀加木通車前去半夏嘔噦噁心加半夏瀉甚不止加炒蒼朮烏梅熟附子少許姜一片燈心一分烏梅一個水煎溫服香砂六君子湯加減治脾瀉香附砂仁厚朴陳皮甘草人參白朮芍藥炒蒼朮炒山藥炒腹痛加木香茴香去人參山藥口渴加乾葛烏梅小便短赤加木通車前嘔噦噁心加藿香烏梅半夏夏月加炒黃連扁豆冬月加煨乾薑芍藥姜一片烏梅一個水煎溫服八桂散治滑瀉不禁人參白朮肉果乾薑訶子附子甘草隨症加減與理中湯同姜一片燈心一分烏梅一個水煎溫服灸法滑瀉不止者百會一穴天樞二穴中脘三穴氣海一穴二陳湯加減治痰瀉茯苓半夏甘草陳皮白朮蒼朮砂仁山藥車前木通厚朴瀉不止加肉果訶子去厚朴隨症加減與香砂六君子同煎法同前香薷飲治暑瀉方載暑症條內瀉脈氣虛浮而無力有火沉細數有虛有濕沉而細有痰軟滑食積氣口緊盛瀉者下利不禁是也經曰泄瀉多濕熱食氣虛時或因痰亦有之也故曰暴瀉非陽久瀉非陰皆是土虛不能制木而木來乘脾方有此病且如瀉而腹不痛者是濕也水穀不化者是氣虛也腸鳴或瀉或止或多或少陣陣作痛者是火與痰也先腹痛瀉後痛減者是食積也濕則燥之虛則補之火者伐火利水分之痰者豁之食積者消導疏滌之治瀉之法無過此也田氏考之曰泄瀉前論未見詳盡難經曰有胃泄有脾泄有大腸泄有小腸泄有大瘕泄名曰五泄皆有所受胃泄色黃水穀不化即飧泄也脾泄胸腹脹滿泄主嘔吐食出即濡泄也大腸瀉食已窘迫大便色白腸鳴切痛即洞泄也小腸瀉泄而便膿血即血泄也瘕泄裡急後重數至圊而不能便莖中痛即腸澼也大抵胃弱雖受而不能運化濕熱熏蒸乃不勝者受邪法當健脾除濕益胃調中如久不愈升提下陷之氣實腸胃為主治泄之法不出於此補中益氣湯治氣虛瀉方見丹溪內傷門胃苓湯治濕瀉即平胃散合五苓散實腸散治久瀉不止厚朴肉豆蔻訶子皮茯苓甘草砂仁陳皮蒼朮木香手足冷加炒乾姜水煎服曲術調中湯治食積瀉陳皮半夏茯苓甘草白朮枳實厚朴大黃蒼朮神麯山楂姜一片水煎服白朮芍藥湯治痛瀉白朮芍藥甘草陳皮防風香附木香茯苓厚朴姜一片水煎服豁痰枳朮湯治痰瀉火瀉陳皮半夏白朮神麯山楂茯苓甘草香附枳殼黃連薑汁炒水煎服真人養臟湯治滑腸泄瀉不止霍亂霍亂者有濕霍亂有乾霍亂皆是內傷飲食生冷外感風寒暑濕而成濕霍亂忽時心腹疼痛或上嘔吐或下泄瀉齊作撩亂不安四肢厥冷六脈浮沉伏絕此名濕霍亂俗云虎狼病因風則怕風有汗無風則怕寒無汗因暑則熱煩躁悶因濕則身體重著因食則胸腹飽悶治用正氣散加減若吐瀉煩躁不止厥冷痛甚轉筋入腹者死夏月因伏暑熱霍亂吐瀉者甚多手足雖微冷脈雖虛小切不可用薑附熱藥治在暑症香薷厥內治之又有發熱頭痛身痛脈浮緊吐瀉者更有一種乾霍亂者最難治也死在須臾俗言絞腸痧忽時心腹絞痛手足厥冷脈沉細或沉伏欲吐不得吐欲瀉不得瀉陰陽乖隔升降不通急用鹽湯探吐及刺委中穴出血治用理中湯加減莫飲米湯補住邪氣難治待吐瀉後方可飲清米湯以接元氣若吐瀉不止胸腹脹硬面唇青手足冷過肘膝六脈伏絕氣喘息舌短囊縮者此死症正氣散加減治濕霍亂吐瀉脈浮沉伏欲絕藿香蒼朮白朮茯苓香附厚朴砂仁陳皮乾薑官桂甘草夏月吐瀉霍亂煩渴自汗脈虛小本方去乾薑官桂香附加香薷黃連腹痛吐瀉手足厥冷脈沉伏欲絕加人參附子去官桂香附腹痛甚不止加乳香茴香木香去香附嘔吐不止加丁香半夏山藥人參肉果訶子烏梅去厚朴香附虛汗加人參當歸去蒼朮藿香口渴加人參烏梅去乾薑官桂胸腹飽悶加白豆蔻益智仁去白朮小便短赤澀加木通車前去乾薑煩躁加人參黃耆當歸酸棗仁神砂去厚朴砂仁香附蒼朮官桂吐瀉多元氣虛脫昏倦手足厥冷脈沉加人參附子黃耆當歸山藥烏梅去厚朴香附砂仁蒼朮因吐瀉多轉筋入腳腿痠加牛膝當歸白芍乳香去厚朴香附藿香姜一片烏梅一個燈心一分水煎溫服參胡三白湯霍亂吐瀉止後發熱頭疼體痛口渴脈數用此藥加減治之人參柴胡白朮茯苓芍藥甘草當歸陳皮五味子梔子麥冬棗二枚烏梅一個燈心一分水煎溫服理中湯加減治乾霍亂心腹膨脹絞痛不吐不瀉脈沉伏欲絕先用鹽湯探吐後急用此方藿香蒼朮厚朴香附砂仁木香枳殼陳皮甘草乾薑官桂夏月乾霍亂不吐瀉胸腹絞煩渴自汗不可用薑桂心腹絞痛面唇青手足冷脈伏欲絕加茴香去蒼朮心腹飽脹硬痛結實者加檳榔枳實山楂瓜蔞蘿蔔子去甘草枳殼蒼朮虛汗加附子去蒼朮藿香胃寒嘔噦發呃加丁香茴香良薑去官桂甘草蒼朮姜三片水煎磨入木香調服外用炒姜同藥渣揉肚急用鹽湯灌下吐得物出為好及刺委中穴血出甚妙夏月暑熱多餐飲食生冷停滯胸腹不化腹硬絞痛不得吐瀉亦是內寒乾霍亂用前調中湯加減治之藿香正氣散加減治異鄉人初到地方不服水土或吐或瀉或胸腹飽悶或腫脹不吐不瀉者俱可治藿香蒼朮厚朴陳皮砂仁香附半夏甘草瀉加白朮烏梅炒山藥飽悶加益智大腹皮嘔吐加山藥烏梅炒米炒白朮腹痛加木香茴香發腫氣急加蘇子桑白皮木通豬苓木香大腹皮去甘草小便短赤加木通豬苓梔子車前去甘草半夏胸腹飽脹或四肢浮腫如不吐瀉者可加蘿蔔子枳殼大腹皮木通去甘草半夏內寒手足冷脈沉細加乾薑官桂內熱煩渴加乾薑黃連梔子烏梅去半夏甘草煎同前霍亂脈浮洪生微遲死霍亂者揮霍撩亂是也內有所積外有所感陽不上升陰不下降以致此疾仲景曰邪在上焦則吐邪在中焦既吐且利此為急病也甚則轉筋乃血熱之急又有乾霍亂則為死症欲吐不吐欲利不利俗謂之絞腸痧死在須臾升降不通故也法曰既有其入必有所出今有其入不得其出者否也塞也必提其氣最是良法田氏考之曰醫之用藥如帥之用兵本草云良醫不能以無藥愈疾猶良帥無兵不足以勝敵也故用藥如用兵之法治霍亂如用兵之急不可緩也仲景曰熱多飲水者五苓散寒多不飲水者理中湯若病將愈更不可就食粟米湯粟米入胃速死無救本草粟米能養胃氣去脾胃中之熱霍亂之後脾胃極虛不能化物一補之間胃氣不行去死速矣且如人之將危以利刃鋸其首豈有生乎若吐瀉之後多時方可少少與之以遲為妙半夏湯治霍亂轉筋吐瀉不止半夏曲茯苓淡桂甘草酒芩蒼朮紅花厚朴人參白朮共為末渴者涼水調服不渴者溫水調服丹溪曰轉筋男子以手挽其陰女人以手牽其乳近兩旁千金妙方也五苓散治發熱欲飲水心神恍惚加辰砂二錢白朮赤茯苓豬苓各二錢四分澤瀉四錢官桂一錢六分共為末大人三錢一服熱水調下理中湯治吐瀉不止不飲水身冷汗出方可用此人參三錢白朮三錢乾薑三錢甘草三錢三因加附子水煎六和湯治霍亂吐瀉兩腳轉筋四肢厥冷半夏杏仁甘草縮砂藿香木瓜赤茯苓厚朴香薷白扁豆姜三片棗一枚水煎服嘔吐嘔吐者胃經病也有聲有物謂之嘔吐有聲無物謂之乾嘔內經云木陳者枝葉枯病深者其聲噦噦為重病若是胃寒嘔噦吐清水冷涎脈沉遲者是寒吐用理中湯加減胃熱煩渴嘔噦脈數是熱嘔用黃連竹茹湯加減發熱嘔吐不止者用柴胡湯加減飽悶作酸嘔吐者是停食吐用香砂平胃散加減煩熱嘔噦吐痰者是痰火吐用二陳湯加減寒水停胃嘔吐者用茯苓半夏湯加減久病嘔吐者是胃虛不納穀也用六君子湯加減濕霍亂乾嘔與夏月伏暑各有法治止吐之心徐徐服之不可急用急則轉吐而不納矣理中湯加減治胃寒嘔吐清水冷涎人參茯苓白朮乾薑半夏陳皮藿香丁香砂仁官桂寒極手足冷脈微細吐不止加附子去官桂若煩渴加神砂炒米姜三片烏梅一個水煎不拘時徐徐服黃連竹茹湯治胃熱煩渴嘔吐黃連薑汁炒竹茹山藥炒人參白朮茯苓陳皮白芍麥冬甘草炒米發熱加柴胡烏梅一個棗二枚水煎不拘時徐徐服二陳湯加減治痰火嘔吐茯苓半夏陳皮甘草加白朮人參竹茹砂仁麥冬烏梅炒山藥姜一片棗二枚水煎不拘時徐服茯苓半夏湯治傷寒水停胃嘔吐茯苓半夏陳皮甘草蒼朮厚朴砂仁藿香乾薑烏梅姜一片水煎不拘時徐服六君子湯加減治久病胃虛嘔吐人參白朮茯苓白芍山藥當歸藿香砂仁烏梅蓮肉半夏陳皮甘草炒米乾薑少許姜一片棗二枚水煎不拘時徐徐服噁心者心中兀兀然無奈欲吐不吐欲嘔不嘔為噁心此非心經病病在胃口有寒有熱有痰有胃虛有停食水其治法同香砂平胃散治傷食嘔吐方載傷食條內嘔吐脈虛細吉實大凶論曰嘔吐有三種之分有聲無物謂之噦有聲有物謂之嘔吐丹溪之論當分氣血受之氣受病令人多嘔血受病令人多吐氣血受病有聲有物謂之嘔吐河間曰火氣炎上痰隔中焦食不得下有氣逆者有寒氣鬱於胃口者但因火與痰者為多大抵嘔吐皆是上焦受邪今胃為受納之司胃氣不和病所生也田氏考之曰胃中有火膈上有痰滿而上逆不得下降經曰諸逆上升屬火正謂此也又有久病嘔吐者乃因胃氣大虛不納穀也有夏月伏暑在內而嘔吐者有酒食過多氣不勝食而嘔吐者後二經之病不分氣血受之但隨經取症從症用藥虛補實瀉自然之理清火化痰丹溪之法凡人節飲食寡嗜欲不失四時之調養則胃氣和平何嘔吐之有降火化痰湯治痰隔中焦嘔吐陳皮半夏茯苓甘草梔子炒黃連姜炒前胡白朮白芍神麯姜一片水煎服和中桔梗湯治上焦熱氣上衝嘔吐酒食過多並皆治之桔梗陳皮枳實茯苓白朮厚朴半夏曲黃連白芍姜水煎服加減蘇子降氣湯治氣逆而嘔吐當歸甘草前胡厚朴陳皮官桂半夏曲竹茹香附青皮白朮藿香姜水煎服安胃和中湯治久病胃虛而嘔吐者寒氣在胃口而嘔吐者半夏白朮檳榔木香甘草茯苓藿香人參陳皮厚朴姜水煎服加減五苓散治夏月中暑嘔吐豬苓澤瀉白朮茯苓官桂人參白扁豆厚朴共為末冷水調服膈噫膈噫者年老之人陰血枯槁痰火氣結升而不降飲食不下而成此病也用當歸養榮湯加減年少之人有患此病者胃脘血燥不潤便故塞用生津補心湯加減大凡膈噫病翻胃不可服辛熱香燥最能耗血糞如羊屎者不治大腸無血故也口吐白沫者不治俱憊故也當歸養榮湯治老年膈噫當歸熟地白芍茯苓貝母枳實瓜蔞陳皮香附撫芎蘇子沉香厚朴姜一小片棗二枚水煎入沉香末調竹瀝服生津補血湯加減治年少胃脘血燥故塞當歸熟地生地白芍茯苓枳實陳皮蘇子沉香貝母砂仁黃連炒姜一小片棗二枚水煎入沉香末調竹瀝服膈噫脈氣虛浮緩無力有痰寸關滑數血虛數而無力有火數而有力百病之始皆損傷胃氣者多也經曰二陽之病發心脾心主血心受病則血不流脾主味脾受病則味不化味不化則胃氣衰矣日久元氣不足胃脘漸干所謂無血故也丹溪曰乾槁在上而近於咽者飲水可行食物難入或可少食名之曰噎其槁在下而近於胃者食雖可入難盡入胃良久復吐名之曰膈二者之病與翻胃相同其名則異也若胃氣和平諸經不得相失則臟腑之火不起金水二氣有養陰血自生腸胃津液傳化不少有何噫之有也田氏考之曰此病多因內傷外感氣虛血虛有痰有火清氣返行濁道三陽內結不行以致此疾張雞峰曰噎當是神思間病惟內觀自養可以治之此言深中病情法當氣虛補氣血虛補血有痰化痰有火降火老年者不治糞如羊糞者不治口中出沫但見大者不治皆因腸胃津少氣血虛急此三者之症所以故不治也又不可用香燥之藥服之令人速死當薄滋味為主惟牛乳可食牛乳能潤腸胃若不如此十無一生也加減四物湯治血虛噎膈芍藥當歸南芎熟地黃連貝母薏苡仁瓜蔞白朮厚朴香附人參姜一片水煎服加減四君子湯治氣虛此藥下保和丸人參白朮茯苓甘草陳皮半夏黃連貝母竹茹藕汁姜一片水煎服清火益胃湯治痰火胃虛陳皮黃連厚朴茯苓甘草黃芩吳茱萸白朮知母前胡麥冬貝母五味子煎法同前翻胃翻胃者吐食而不納也俗言轉食病名雖不同法皆一體年老之人多有此病用安胃湯加減治之安胃湯人參白朮茯苓當歸半夏山藥陳皮川黃連藿香砂仁烏梅甘草乾薑煨建蓮肉姜一片棗二枚水煎不拘時服
